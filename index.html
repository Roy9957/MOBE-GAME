<!DOCTYPE html>
<html>
<head>
  <title>MOBE GAME</title>
  <style>
    body {
      margin: 0;
      overflow: hidden; /* Overflow removed */
      width: 100vw;
      height: 100vh;
    }
    canvas {
      display: block;
      margin: 0 auto;
      touch-action: none; /* Prevent default touch scrolling */
      border: 3px solid black;
      background: #f0f0f0; /* Better background */
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5); /* Shadow effect */
      width: 100%;  /* Canvas width set to 100% */
      height: 100%; /* Canvas height set to 100% */
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- Firebase SDK -->
  <script type="module">
    // Import Firebase SDKs
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

    // Your Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCrQJRwfTV8a1BIwMQexWxsHi2OKyTj8hg",
      authDomain: "artificial-intelligence-55880.firebaseapp.com",
      databaseURL: "https://artificial-intelligence-55880-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "artificial-intelligence-55880",
      storageBucket: "artificial-intelligence-55880.appspot.com",
      messagingSenderId: "985195404301",
      appId: "1:985195404301:web:12aea7b9c4719b6bdb0944"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Player and Game State Data
    const playerId = `player_${Math.random().toString(36).substr(2, 9)}`; // Unique player ID
    let player = { id: playerId, x: 400, y: 200, health: 100 }; // Initial position and health
    let players = {}; // Store all players' data

    // Adjust canvas size
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); // Initial resize

    // Sync player to Firebase
    function syncPlayer() {
      const playerRef = ref(db, `players/${playerId}`);
      set(playerRef, player);
      onDisconnect(playerRef).remove(); // Remove player data on disconnect
    }

    // Listen for changes to all players
    onValue(ref(db, 'players'), (snapshot) => {
      players = snapshot.val() || {}; // Get all players
      renderGame(); // Re-render game
    });

    // Draw all players
    function drawPlayers() {
      Object.values(players).forEach(p => {
        ctx.fillStyle = p.id === playerId ? 'blue' : 'red'; // Different color for current player
        ctx.fillRect(p.x - 20, p.y - 20, 40, 40);
        ctx.fillStyle = 'green';
        ctx.fillRect(p.x - 20, p.y - 40, 40, 10); // Health bar background
        ctx.fillStyle = 'red';
        ctx.fillRect(p.x - 20, p.y - 40, p.health * 0.4, 10); // Health bar fill
      });
    }

    // Render the game
    function renderGame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawPlayers();
    }

    // Handle touch movement
    canvas.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      const deltaX = touch.clientX - player.x;
      const deltaY = touch.clientY - player.y;

      if (Math.abs(deltaX) > Math.abs(deltaY)) {
        if (deltaX > 0) player.x += 10; // Move right
        else player.x -= 10; // Move left
      } else {
        if (deltaY > 0) player.y += 10; // Move down
        else player.y -= 10; // Move up
      }

      syncPlayer(); // Update Firebase
    });

    // Game loop to update and render
    function gameLoop() {
      renderGame();
      requestAnimationFrame(gameLoop);
    }

    syncPlayer(); // Initial sync
    gameLoop(); // Start the game loop
  </script>
</body>
</html>
